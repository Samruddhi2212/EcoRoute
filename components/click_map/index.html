<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; }
    #map { height: 420px; width: 100%; border-radius: 8px; }
    #hint {
      margin-top: 8px;
      padding: 6px 14px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      font-size: 13px;
      color: #166534;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="hint">🗺️ Click anywhere on the map to add a stop</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ── Streamlit component messaging ──────────────────────────────────────
    function sendValue(value) {
      window.parent.postMessage(
        { isStreamlitMessage: true, type: "streamlit:setComponentValue", value: value },
        "*"
      );
    }
    function setFrameHeight(height) {
      window.parent.postMessage(
        { isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: height },
        "*"
      );
    }
    function ready() {
      window.parent.postMessage(
        { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 },
        "*"
      );
    }

    // ── Map setup ──────────────────────────────────────────────────────────
    var map = L.map("map").setView([40.7128, -74.0060], 12);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
      attribution: "© CartoDB"
    }).addTo(map);

    var markers = [];

    function clearMarkers() {
      markers.forEach(function(m) { map.removeLayer(m); });
      markers = [];
    }

    function addMarker(lat, lon, label, isFirst) {
      var iconUrl = isFirst
        ? "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png"
        : "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png";
      var marker = L.marker([lat, lon], {
        icon: L.icon({ iconUrl: iconUrl, iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34] })
      }).addTo(map).bindTooltip(label, { permanent: false });
      markers.push(marker);
    }

    // ── Receive args from Streamlit (existing stops to display) ───────────
    window.addEventListener("message", function(e) {
      if (!e.data || !e.data.isStreamlitMessage) return;
      if (e.data.type !== "streamlit:render") return;

      var args = e.data.args || {};
      clearMarkers();

      if (args.stops && args.stops.length > 0) {
        args.stops.forEach(function(stop, i) {
          addMarker(stop.lat, stop.lon, (i + 1) + ". " + stop.name, i === 0);
        });

        // Draw route line
        var latlngs = args.stops.map(function(s) { return [s.lat, s.lon]; });
        if (window._routeLine) map.removeLayer(window._routeLine);
        window._routeLine = L.polyline(latlngs, { color: "#2ecc71", weight: 4, opacity: 0.8 }).addTo(map);
        map.fitBounds(window._routeLine.getBounds(), { padding: [30, 30] });
      }
    });

    // ── Click to add stop ─────────────────────────────────────────────────
    map.on("click", function(e) {
      var lat = e.latlng.lat;
      var lon = e.latlng.lng;

      // Temporary marker while geocoding
      var tmp = L.circleMarker([lat, lon], { radius: 8, color: "#f97316", fillOpacity: 0.7 }).addTo(map);
      document.getElementById("hint").textContent = "📍 Looking up address...";

      sendValue({ lat: lat, lon: lon });

      setTimeout(function() { map.removeLayer(tmp); }, 3000);
      setTimeout(function() {
        document.getElementById("hint").textContent = "🗺️ Click anywhere on the map to add a stop";
      }, 3000);
    });

    // ── Init ──────────────────────────────────────────────────────────────
    setFrameHeight(460);
    ready();
  </script>
</body>
</html>
